<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111113"/>
      <stop offset="100%" stop-color="#0B0B0C"/>
    </linearGradient>
    <linearGradient id="acc1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid1" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1F1F23" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="600" height="600" fill="url(#bg1)"/>
  <rect width="600" height="600" fill="url(#grid1)"/>
  <circle cx="300" cy="300" r="280" fill="url(#glow1)"/>

  <!-- Data bars in background -->
  <g opacity="0.3">
    <rect x="80" y="420" width="20" height="60" rx="2" fill="#6366F1"/>
    <rect x="110" y="380" width="20" height="100" rx="2" fill="#6366F1"/>
    <rect x="140" y="400" width="20" height="80" rx="2" fill="#6366F1"/>
    <rect x="170" y="350" width="20" height="130" rx="2" fill="#818CF8"/>
    <rect x="200" y="370" width="20" height="110" rx="2" fill="#6366F1"/>
    <rect x="440" y="410" width="20" height="70" rx="2" fill="#6366F1"/>
    <rect x="470" y="390" width="20" height="90" rx="2" fill="#818CF8"/>
    <rect x="500" y="360" width="20" height="120" rx="2" fill="#6366F1"/>
  </g>

  <!-- Connecting nodes -->
  <g opacity="0.4">
    <line x1="120" y1="120" x2="220" y2="180" stroke="#6366F1" stroke-width="1"/>
    <line x1="220" y1="180" x2="380" y2="140" stroke="#6366F1" stroke-width="1"/>
    <line x1="380" y1="140" x2="480" y2="220" stroke="#6366F1" stroke-width="1"/>
    <line x1="220" y1="180" x2="180" y2="280" stroke="#6366F1" stroke-width="1"/>
    <circle cx="120" cy="120" r="3" fill="#818CF8"/>
    <circle cx="220" cy="180" r="4" fill="#818CF8"/>
    <circle cx="380" cy="140" r="3" fill="#818CF8"/>
    <circle cx="480" cy="220" r="3" fill="#818CF8"/>
    <circle cx="180" cy="280" r="3" fill="#818CF8"/>
  </g>

  <!-- Magnifying glass -->
  <g transform="translate(300 300)">
    <circle cx="0" cy="0" r="110" fill="none" stroke="url(#acc1)" stroke-width="3"/>
    <circle cx="0" cy="0" r="110" fill="#6366F1" fill-opacity="0.05"/>
    <circle cx="0" cy="0" r="95" fill="none" stroke="#818CF8" stroke-width="0.5" stroke-opacity="0.5"/>
    <line x1="78" y1="78" x2="150" y2="150" stroke="url(#acc1)" stroke-width="6" stroke-linecap="round"/>

    <!-- Inside lens -->
    <g opacity="0.8">
      <circle cx="-30" cy="-20" r="3" fill="#818CF8"/>
      <circle cx="20" cy="-30" r="3" fill="#818CF8"/>
      <circle cx="40" cy="20" r="3" fill="#818CF8"/>
      <circle cx="-20" cy="30" r="3" fill="#818CF8"/>
      <line x1="-30" y1="-20" x2="20" y2="-30" stroke="#818CF8" stroke-width="0.8"/>
      <line x1="20" y1="-30" x2="40" y2="20" stroke="#818CF8" stroke-width="0.8"/>
      <line x1="40" y1="20" x2="-20" y2="30" stroke="#818CF8" stroke-width="0.8"/>
      <line x1="-20" y1="30" x2="-30" y2="-20" stroke="#818CF8" stroke-width="0.8"/>
    </g>
  </g>

  <text x="300" y="560" text-anchor="middle" fill="#71717A" font-family="monospace" font-size="11" letter-spacing="2">01 / DISCOVERY</text>
</svg>
