<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111113"/>
      <stop offset="100%" stop-color="#0B0B0C"/>
    </linearGradient>
    <linearGradient id="acc4" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="area4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid4" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1F1F23" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="600" height="600" fill="url(#bg4)"/>
  <rect width="600" height="600" fill="url(#grid4)"/>
  <circle cx="300" cy="300" r="280" fill="url(#glow4)"/>

  <!-- Dashboard panel -->
  <g transform="translate(60 110)">
    <rect x="-4" y="-4" width="488" height="388" rx="18" fill="#6366F1" fill-opacity="0.1" filter="blur(20px)"/>
    <rect x="0" y="0" width="480" height="380" rx="16" fill="#111113" stroke="#1F1F23"/>

    <!-- Header -->
    <text x="24" y="38" fill="#E4E4E7" font-family="sans-serif" font-size="14" font-weight="600">Growth Metrics</text>
    <text x="24" y="54" fill="#71717A" font-family="sans-serif" font-size="10">Last 12 months</text>

    <rect x="380" y="22" width="76" height="22" rx="11" fill="#6366F1" fill-opacity="0.15" stroke="#6366F1" stroke-opacity="0.4"/>
    <circle cx="395" cy="33" r="3" fill="#10B981"/>
    <text x="404" y="37" fill="#818CF8" font-family="sans-serif" font-size="10">+247%</text>

    <!-- Stat cards row -->
    <g transform="translate(24 78)">
      <rect x="0" y="0" width="130" height="60" rx="8" fill="#0B0B0C" stroke="#1F1F23"/>
      <text x="14" y="20" fill="#71717A" font-family="sans-serif" font-size="9">Revenue</text>
      <text x="14" y="42" fill="#E4E4E7" font-family="sans-serif" font-size="18" font-weight="600">$1.2M</text>
      <text x="100" y="42" fill="#10B981" font-family="sans-serif" font-size="9">+38%</text>

      <rect x="142" y="0" width="130" height="60" rx="8" fill="#0B0B0C" stroke="#1F1F23"/>
      <text x="156" y="20" fill="#71717A" font-family="sans-serif" font-size="9">Users</text>
      <text x="156" y="42" fill="#E4E4E7" font-family="sans-serif" font-size="18" font-weight="600">24.8K</text>
      <text x="240" y="42" fill="#10B981" font-family="sans-serif" font-size="9">+62%</text>

      <rect x="284" y="0" width="130" height="60" rx="8" fill="#0B0B0C" stroke="#1F1F23"/>
      <text x="298" y="20" fill="#71717A" font-family="sans-serif" font-size="9">Conversion</text>
      <text x="298" y="42" fill="#E4E4E7" font-family="sans-serif" font-size="18" font-weight="600">8.4%</text>
      <text x="380" y="42" fill="#10B981" font-family="sans-serif" font-size="9">+24%</text>
    </g>

    <!-- Chart area -->
    <g transform="translate(24 160)">
      <rect x="0" y="0" width="432" height="200" rx="8" fill="#0B0B0C" stroke="#1F1F23"/>

      <!-- Y axis lines -->
      <g stroke="#1F1F23" stroke-width="0.5">
        <line x1="20" y1="40" x2="412" y2="40"/>
        <line x1="20" y1="80" x2="412" y2="80"/>
        <line x1="20" y1="120" x2="412" y2="120"/>
        <line x1="20" y1="160" x2="412" y2="160"/>
      </g>

      <!-- Area under chart -->
      <path d="M 20 170 L 60 160 L 100 150 L 140 140 L 180 125 L 220 105 L 260 85 L 300 65 L 340 50 L 380 35 L 412 25 L 412 180 L 20 180 Z"
            fill="url(#area4)"/>

      <!-- Chart line -->
      <path d="M 20 170 L 60 160 L 100 150 L 140 140 L 180 125 L 220 105 L 260 85 L 300 65 L 340 50 L 380 35 L 412 25"
            fill="none" stroke="url(#acc4)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- End point -->
      <circle cx="412" cy="25" r="6" fill="#0B0B0C" stroke="#A78BFA" stroke-width="2"/>
      <circle cx="412" cy="25" r="12" fill="#A78BFA" fill-opacity="0.2"/>
      <circle cx="412" cy="25" r="20" fill="#A78BFA" fill-opacity="0.1"/>

      <!-- X axis labels -->
      <g fill="#3F3F46" font-family="monospace" font-size="8">
        <text x="20" y="195">JAN</text>
        <text x="100" y="195">MAR</text>
        <text x="180" y="195">MAY</text>
        <text x="260" y="195">JUL</text>
        <text x="340" y="195">SEP</text>
        <text x="395" y="195">DEC</text>
      </g>
    </g>
  </g>

  <!-- Floating up arrows -->
  <g opacity="0.5">
    <path d="M 100 80 L 100 50 M 95 60 L 100 50 L 105 60" stroke="#818CF8" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M 540 90 L 540 60 M 535 70 L 540 60 L 545 70" stroke="#818CF8" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M 80 530 L 80 500 M 75 510 L 80 500 L 85 510" stroke="#818CF8" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M 530 530 L 530 500 M 525 510 L 530 500 L 535 510" stroke="#818CF8" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  </g>

  <text x="300" y="560" text-anchor="middle" fill="#71717A" font-family="monospace" font-size="11" letter-spacing="2">04 / SCALE</text>
</svg>
