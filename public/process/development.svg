<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111113"/>
      <stop offset="100%" stop-color="#0B0B0C"/>
    </linearGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid3" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1F1F23" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="600" height="600" fill="url(#bg3)"/>
  <rect width="600" height="600" fill="url(#grid3)"/>
  <circle cx="300" cy="300" r="280" fill="url(#glow3)"/>

  <!-- Code editor window -->
  <g transform="translate(80 130)">
    <!-- Window shadow -->
    <rect x="-4" y="-4" width="448" height="348" rx="14" fill="#6366F1" fill-opacity="0.15" filter="blur(20px)"/>

    <!-- Window -->
    <rect x="0" y="0" width="440" height="340" rx="12" fill="#111113" stroke="#1F1F23" stroke-width="1"/>

    <!-- Title bar -->
    <rect x="0" y="0" width="440" height="32" rx="12" fill="#16161A"/>
    <rect x="0" y="20" width="440" height="12" fill="#16161A"/>
    <circle cx="16" cy="16" r="4" fill="#1F1F23"/>
    <circle cx="32" cy="16" r="4" fill="#1F1F23"/>
    <circle cx="48" cy="16" r="4" fill="#1F1F23"/>
    <rect x="180" y="9" width="100" height="14" rx="3" fill="#0B0B0C"/>
    <text x="230" y="19" text-anchor="middle" fill="#71717A" font-family="monospace" font-size="9">app.tsx</text>

    <!-- Sidebar -->
    <rect x="0" y="32" width="50" height="308" fill="#0B0B0C"/>
    <rect x="14" y="48" width="22" height="2" rx="1" fill="#818CF8"/>
    <rect x="14" y="58" width="16" height="2" rx="1" fill="#1F1F23"/>
    <rect x="14" y="68" width="20" height="2" rx="1" fill="#1F1F23"/>
    <rect x="14" y="78" width="18" height="2" rx="1" fill="#1F1F23"/>
    <rect x="14" y="88" width="22" height="2" rx="1" fill="#1F1F23"/>

    <!-- Line numbers -->
    <g fill="#3F3F46" font-family="monospace" font-size="9">
      <text x="62" y="62">1</text>
      <text x="62" y="80">2</text>
      <text x="62" y="98">3</text>
      <text x="62" y="116">4</text>
      <text x="62" y="134">5</text>
      <text x="62" y="152">6</text>
      <text x="62" y="170">7</text>
      <text x="62" y="188">8</text>
      <text x="62" y="206">9</text>
      <text x="62" y="224">10</text>
      <text x="62" y="242">11</text>
      <text x="62" y="260">12</text>
      <text x="62" y="278">13</text>
      <text x="62" y="296">14</text>
      <text x="62" y="314">15</text>
    </g>

    <!-- Code lines -->
    <g font-family="monospace" font-size="10">
      <text x="80" y="62" fill="#8B5CF6">import</text>
      <text x="118" y="62" fill="#A1A1AA"> </text>
      <text x="122" y="62" fill="#E4E4E7">{ useState }</text>
      <text x="190" y="62" fill="#8B5CF6"> from</text>
      <text x="220" y="62" fill="#10B981"> 'react'</text>

      <text x="80" y="80" fill="#8B5CF6">import</text>
      <text x="122" y="80" fill="#E4E4E7">Brain</text>
      <text x="156" y="80" fill="#8B5CF6"> from</text>
      <text x="186" y="80" fill="#10B981"> './brain'</text>

      <text x="80" y="116" fill="#8B5CF6">export default function</text>
      <text x="220" y="116" fill="#FBBF24"> App</text>
      <text x="244" y="116" fill="#A1A1AA">() {</text>

      <text x="96" y="134" fill="#6366F1">const</text>
      <text x="124" y="134" fill="#E4E4E7"> [data, setData]</text>
      <text x="218" y="134" fill="#A1A1AA"> =</text>
      <text x="226" y="134" fill="#FBBF24"> useState</text>
      <text x="270" y="134" fill="#A1A1AA">([])</text>

      <text x="96" y="170" fill="#6366F1">return</text>
      <text x="128" y="170" fill="#A1A1AA"> (</text>

      <text x="112" y="188" fill="#A1A1AA">&lt;</text>
      <text x="118" y="188" fill="#FBBF24">Brain</text>
      <text x="148" y="188" fill="#818CF8"> processes</text>
      <text x="200" y="188" fill="#A1A1AA">={data}</text>
      <text x="238" y="188" fill="#A1A1AA"> /&gt;</text>

      <text x="96" y="206" fill="#A1A1AA">)</text>
      <text x="80" y="224" fill="#A1A1AA">}</text>

      <text x="80" y="260" fill="#3F3F46">// Build something great</text>
    </g>

    <!-- Cursor -->
    <rect x="252" y="252" width="1.5" height="11" fill="#818CF8"/>
  </g>

  <!-- Floating particles -->
  <g opacity="0.6">
    <circle cx="120" cy="80" r="2" fill="#818CF8"/>
    <circle cx="500" cy="100" r="2" fill="#818CF8"/>
    <circle cx="540" cy="450" r="2" fill="#818CF8"/>
    <circle cx="60" cy="500" r="2" fill="#818CF8"/>
  </g>

  <text x="300" y="560" text-anchor="middle" fill="#71717A" font-family="monospace" font-size="11" letter-spacing="2">03 / BUILD</text>
</svg>
